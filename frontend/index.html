<!DOCTYPE html>
<html lang="pt-BR" data-theme="midnight">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claybox³ᴰ — Gerenciador de Impressão 3D</title>
    <meta name="description" content="Software de gerenciamento de pedidos e recursos para impressão 3D">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="styles/tokens.css">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/layout.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/animations.css">
</head>
<body>
    <div id="app">
        <!-- ═══════════════════════════════════════════════════════════ -->
        <!-- CUSTOM TITLEBAR                                               -->
        <!-- ═══════════════════════════════════════════════════════════ -->
        <header id="titlebar">
            <div class="titlebar-traffic-lights">
                <button class="traffic-light traffic-close" id="titlebar-close" title="Fechar">
                    <svg width="8" height="8" viewBox="0 0 8 8">
                        <line x1="1" y1="1" x2="7" y2="7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                        <line x1="7" y1="1" x2="1" y2="7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                    </svg>
                </button>
                <button class="traffic-light traffic-minimize" id="titlebar-min" title="Minimizar">
                    <svg width="8" height="2" viewBox="0 0 8 2">
                        <line x1="1" y1="1" x2="7" y2="1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                    </svg>
                </button>
                <button class="traffic-light traffic-maximize" id="titlebar-max" title="Maximizar">
                    <svg width="8" height="8" viewBox="0 0 8 8">
                        <polygon points="1,4 4,1 7,4 4,7" fill="currentColor"/>
                    </svg>
                </button>
            </div>
            <div class="titlebar-title">Claybox³ᴰ</div>
            <div class="titlebar-spacer"></div>
        </header>

        <!-- ═══════════════════════════════════════════════════════════ -->
        <!-- APP BODY (sidebar + content)                                   -->
        <!-- ═══════════════════════════════════════════════════════════ -->
        <div id="app-body">
        <!-- ═══════════════════════════════════════════════════════════ -->
        <!-- SIDEBAR                                                       -->
        <!-- ═══════════════════════════════════════════════════════════ -->
        <nav id="sidebar">
            <!-- Brand -->
            <div class="sidebar-brand">
                <div class="brand-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                        <path d="M2 17l10 5 10-5"/>
                        <path d="M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <div class="brand-info">
                    <span class="brand-name">Claybox</span>
                    <span class="brand-sub">³ᴰ</span>
                </div>
            </div>

            <!-- Main nav -->
            <div class="nav-section">
                <span class="nav-label">Menu</span>

                <button class="nav-item active" data-page="dashboard" id="nav-dashboard">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7" rx="1.5"/>
                        <rect x="14" y="3" width="7" height="7" rx="1.5"/>
                        <rect x="3" y="14" width="7" height="7" rx="1.5"/>
                        <rect x="14" y="14" width="7" height="7" rx="1.5"/>
                    </svg>
                    Dashboard
                </button>

                <button class="nav-item" data-page="pedidos" id="nav-pedidos">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                    </svg>
                    Pedidos
                </button>

                <button class="nav-item" data-page="estoque" id="nav-estoque">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                        <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
                        <line x1="12" y1="22.08" x2="12" y2="12"/>
                    </svg>
                    Estoque
                </button>

                <button class="nav-item" data-page="impressoras" id="nav-impressoras">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="6 9 6 2 18 2 18 9"/>
                        <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
                        <rect x="6" y="14" width="12" height="8"/>
                    </svg>
                    Impressoras
                </button>

                <button class="nav-item" data-page="envio" id="nav-envio">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="1" y="3" width="15" height="13"/>
                        <polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/>
                        <circle cx="5.5" cy="18.5" r="2.5"/>
                        <circle cx="18.5" cy="18.5" r="2.5"/>
                    </svg>
                    Envio
                </button>
            </div>

            <!-- Spacer -->
            <div class="sidebar-spacer"></div>

            <!-- Bottom nav -->
            <div class="nav-section">
                <button class="nav-item" data-page="settings" id="nav-settings">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                    Configurações
                </button>
            </div>
        </nav>

        <!-- ═══════════════════════════════════════════════════════════ -->
        <!-- MAIN CONTENT                                                -->
        <!-- ═══════════════════════════════════════════════════════════ -->
        <main id="content">
            <div id="page-dashboard" class="page active"></div>
            <div id="page-pedidos" class="page"></div>
            <div id="page-estoque" class="page"></div>
            <div id="page-impressoras" class="page"></div>
            <div id="page-envio" class="page"></div>
            <div id="page-settings" class="page"></div>
        </main>
        </div><!-- #app-body -->
    </div>

    <!-- ═══════════════════════════════════════════════════════════════ -->
    <!-- MODAL                                                           -->
    <!-- ═══════════════════════════════════════════════════════════════ -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div id="modal-content" class="modal-content"></div>
    </div>

    <!-- ═══════════════════════════════════════════════════════════════ -->
    <!-- TOAST NOTIFICATIONS                                             -->
    <!-- ═══════════════════════════════════════════════════════════════ -->
    <div id="toast-container"></div>

    <!-- ═══════════════════════════════════════════════════════════════ -->
    <!-- SCRIPTS (order matters)                                         -->
    <!-- ═══════════════════════════════════════════════════════════════ -->
    <script src="js/titlebar.js"></script>
    <script src="js/api.js"></script>
    <script src="js/store.js"></script>
    <script src="js/themes.js"></script>
    <script src="js/components.js"></script>
    <script src="js/router.js"></script>
    <script src="js/pages/dashboard.js"></script>
    <script src="js/pages/pedidos.js"></script>
    <script src="js/pages/estoque.js"></script>
    <script src="js/pages/impressoras.js"></script>
    <script src="js/pages/envio.js"></script>
    <script src="js/pages/settings.js"></script>

    <!-- App Init -->
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Carregar settings para aplicar tema salvo
            try {
                const settings = await API.loadSettings();
                if (settings && settings.tema) {
                    Themes.init(settings.tema);
                } else {
                    Themes.init('midnight');
                }
            } catch (e) {
                Themes.init('midnight');
            }

            // Inicializar titlebar
            Titlebar.init();

            // Inicializar router e navegar para dashboard
            Router.init();
            Router.navigate('dashboard');

            console.log('[Claybox³ᴰ] Inicializado');
        });
    </script>
</body>
</html>
